<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0c29"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Astro 1.2"/>
  <meta name="description" content="Astro 1.2 — AI powered by Ano"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Astro 1.2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: Georgia, serif;
      color: #e2d9f3;
    }

    #app {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
    }

    #header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(15,12,41,0.9);
      border-bottom: 1px solid rgba(167,139,250,0.2);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand h1 { font-size: 1.1rem; color: #e9d5ff; }
    .brand small { font-size: 0.7rem; color: #9f7aea; display: block; }

    #scroll-wrap {
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    #messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
      justify-content: flex-end;
    }

    #input-area {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(15,12,41,0.9);
      border-top: 1px solid rgba(167,139,250,0.2);
    }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.bot { justify-content: flex-start; align-items: flex-end; gap: 8px; }

    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 18px 18px 18px 4px;
    }

    .dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #a78bfa;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 20px;
      color: #e2d9f3;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 100px;
      resize: none;
      -webkit-appearance: none;
    }
    textarea:focus { outline: none; border-color: rgba(167,139,250,0.6); }
    textarea::placeholder { color: rgba(167,139,250,0.35); }

    #send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:disabled { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="brand">
      <span>✨</span>
      <div>
        <h1>Astro 1.2</h1>
        <small>powered by Ano</small>
      </div>
    </div>
  </div>

  <div id="scroll-wrap">
    <div id="messages"></div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ketik pesan..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const SYSTEM = `Kamu adalah Ano, asisten AI yang ramah, cerdas, dan suka membantu. Jika ditanya siapa kamu, jawab bahwa kamu adalah Ano. Jawab dalam bahasa yang sama dengan pengguna.`;
  const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
  const MODEL = "llama-3.3-70b-versatile";
  const apiKey = "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";

  let history = [];
  let loading = false;

  const scrollWrap = document.getElementById("scroll-wrap");
  const messagesEl = document.getElementById("messages");
  const textarea = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  function scrollBottom() {
    setTimeout(() => { scrollWrap.scrollTop = scrollWrap.scrollHeight; }, 50);
  }

  function addMsg(role, content, isTyping) {
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    if (isTyping) div.id = "typing";
    if (role === "bot") {
      div.innerHTML = `<div class="avatar">✨</div><div class="bubble bot">${isTyping ? '<div class="dots"><span></span><span></span><span></span></div>' : esc(content)}</div>`;
    } else {
      div.innerHTML = `<div class="bubble user">${esc(content)}</div>`;
    }
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function esc(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  }

  // First message
  addMsg("bot", "Halo! Aku Ano 👋 Mau tanya apa?");

  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 100) + "px";
  });
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text || loading) return;
    loading = true;
    sendBtn.disabled = true;
    textarea.value = "";
    textarea.style.height = "auto";

    history.push({ role: "user", content: text });
    addMsg("user", text);
    addMsg("bot", "", true);

    try {
      const res = await fetch(GROQ_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1000,
          messages: [{ role: "system", content: SYSTEM }, ...history]
        })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || "Maaf, error.";
      history.push({ role: "assistant", content: reply });
      const t = document.getElementById("typing");
      if (t) { t.querySelector(".bubble").innerHTML = esc(reply); t.removeAttribute("id"); }
    } catch {
      const t = document.getElementById("typing");
      if (t) { t.querySelector(".bubble").innerHTML = "⚠️ Error. Coba lagi!"; t.removeAttribute("id"); }
      history.pop();
    } finally {
      loading = false;
      sendBtn.disabled = false;
      scrollBottom();
    }
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
