<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0c29"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Astro 1.2"/>
  <meta name="description" content="Astro 1.2 — AI powered by Ano"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>Astro 1.2</title>
  <style>
    :root {
      --bg1: #0f0c29;
      --bg2: #302b63;
      --bg3: #24243e;
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --text: #e2d9f3;
      --muted: #9f7aea;
      --border: rgba(167,139,250,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      height: 100%;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      overflow: hidden;
    }

    /* ── SETUP SCREEN ── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px 20px;
      gap: 20px;
      text-align: center;
      width: 100%;
    }
    #setup .icon { font-size: 48px; }
    #setup h1 { font-size: 2rem; color: #e9d5ff; letter-spacing: 0.05em; }
    #setup p { color: var(--muted); font-size: 0.85rem; line-height: 1.6; max-width: 320px; }
    #setup input {
      width: 100%; max-width: 360px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 0.9rem;
      font-family: monospace;
    }
    #setup input:focus { outline: none; border-color: var(--purple-light); }
    #setup input::placeholder { color: rgba(167,139,250,0.3); font-family: Georgia, serif; }
    #setup button {
      width: 100%; max-width: 360px;
      padding: 13px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      border: none; border-radius: 12px;
      color: #fff; font-size: 1rem; font-family: inherit;
      cursor: pointer; font-weight: bold;
    }
    #setup a { color: var(--purple-light); font-size: 0.8rem; text-decoration: none; }

    /* ── CHAT SCREEN ── */
    #app {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 640px;
      height: 100%;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      margin: 0 auto;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,12,41,0.8);
      flex-shrink: 0;
      z-index: 10;
    }
    #header .brand { display: flex; align-items: center; gap: 10px; }
    #header .brand span { font-size: 22px; }
    #header .brand h1 { font-size: 1.1rem; color: #e9d5ff; }
    #header .brand small { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 1px; }
    #logout {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 5px 10px;
      cursor: pointer;
      font-family: inherit;
    }

    /* Messages - KEY FIX */
    #messages {
      position: absolute;
      top: 60px;
      bottom: 72px;
      left: 0;
      right: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: #4c3d8f; border-radius: 4px; }

    .msg { display: flex; animation: fadeUp 0.25s ease; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; margin-right: 8px; flex-shrink: 0; margin-top: 2px;
    }

    .bubble {
      max-width: 80%;
      border-radius: 18px;
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble.assistant {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
    }

    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--purple-light);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input - fixed at bottom */
    #input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(15,12,41,0.8);
      z-index: 10;
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 10px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      resize: none;
      -webkit-appearance: none;
    }
    textarea:focus { outline: none; border-color: rgba(167,139,250,0.5); }
    textarea::placeholder { color: rgba(167,139,250,0.35); }

    #send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, transform 0.2s;
    }
    #send-btn:disabled {
      background: rgba(255,255,255,0.1);
      cursor: not-allowed;
    }
    #send-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setup">
    <div class="icon">✨</div>
    <h1>Astro 1.2</h1>
    <p>Masukkan API Key Anthropic kamu untuk mulai menggunakan Astro 1.2.</p>
    <input type="password" id="api-key-input" placeholder="gsk_..." autocomplete="off" spellcheck="false"/>
    <button onclick="saveKey()">Mulai Chat →</button>
    <a href="https://console.groq.com/keys" target="_blank">Dapatkan API Key Groq gratis →</a>
    <p style="font-size:0.72rem; color: rgba(167,139,250,0.4);">API key disimpan di HP kamu saja, tidak dikirim ke mana-mana.</p>
  </div>

  <!-- CHAT SCREEN -->
  <div id="app">
    <div id="header">
      <div class="brand">
        <span>✨</span>
        <div>
          <h1>Astro 1.2</h1>
          <small>powered by Ano</small>
        </div>
      </div>
      <button id="logout" onclick="logout()">Ganti Key</button>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Ketik pesan..."></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const SYSTEM = `Kamu adalah Ano, asisten AI yang ramah, cerdas, dan suka membantu.
Jika ditanya siapa kamu, jawab bahwa kamu adalah Ano, AI buatan pengguna ini.
Jawab dalam bahasa yang sama dengan pertanyaan pengguna.
Jawaban kamu singkat, jelas, dan helpful.`;
    const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
    const MODEL = "llama-3.3-70b-versatile";

    let history = [];
    let loading = false;
    const apiKey = "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";

    window.onload = () => showChat();

    function logout() {}
    function showSetup() {}

    function showChat() {
      document.getElementById("setup").style.display = "none";
      document.getElementById("app").style.display = "flex";
      if (history.length === 0) {
        addMessage("assistant", "Halo! Aku Ano 👋 Mau tanya apa?");
      }
    }

    // Auto resize textarea
    const textarea = document.getElementById("input");
    textarea.addEventListener("input", () => {
      textarea.style.height = "auto";
      textarea.style.height = Math.min(textarea.scrollHeight, 100) + "px";
    });
    textarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function addMessage(role, content, isTyping = false) {
      const msgs = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      if (isTyping) div.id = "typing-msg";

      if (role === "assistant") {
        div.innerHTML = `
          <div class="avatar">✨</div>
          <div class="bubble assistant">${isTyping
            ? '<div class="typing-dots"><span></span><span></span><span></span></div>'
            : escapeHtml(content)
          }</div>`;
      } else {
        div.innerHTML = `<div class="bubble user">${escapeHtml(content)}</div>`;
      }

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
    }

    async function sendMessage() {
      const text = textarea.value.trim();
      if (!text || loading) return;

      loading = true;
      document.getElementById("send-btn").disabled = true;
      textarea.value = "";
      textarea.style.height = "auto";

      history.push({ role: "user", content: text });
      addMessage("user", text);
      addMessage("assistant", "", true);

      try {
        const res = await fetch(GROQ_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: MODEL,
            max_tokens: 1000,
            messages: [
              { role: "system", content: SYSTEM },
              ...history,
            ],
          }),
        });

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || "Maaf, tidak bisa menjawab.";
        history.push({ role: "assistant", content: reply });

        const typing = document.getElementById("typing-msg");
        if (typing) {
          typing.querySelector(".bubble").innerHTML = escapeHtml(reply);
          typing.removeAttribute("id");
        }
      } catch {
        const typing = document.getElementById("typing-msg");
        if (typing) {
          typing.querySelector(".bubble").innerHTML = "⚠️ Error. Coba lagi ya!";
          typing.removeAttribute("id");
        }
        history.pop();
      } finally {
        loading = false;
        document.getElementById("send-btn").disabled = false;
        document.getElementById("messages").scrollTop = 999999;
      }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
