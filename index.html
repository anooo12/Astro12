<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0c29"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Astro"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Astro</title>
  <style>
    :root {
      --bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e;
      --purple:#7c3aed;--purple-light:#a78bfa;
      --text:#e2d9f3;--muted:#9f7aea;--border:rgba(167,139,250,0.2);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));font-family:Georgia,serif;color:var(--text)}
    #app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column}
    #header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(15,12,41,0.95);border-bottom:1px solid var(--border);gap:8px}
    .brand{display:flex;align-items:center;gap:8px}
    .brand-icon{font-size:20px}
    .brand-text h1{font-size:1rem;color:#e9d5ff;line-height:1.2}
    .brand-text small{font-size:0.65rem;color:var(--muted)}
    .model-switch{display:flex;background:rgba(255,255,255,0.07);border-radius:20px;padding:3px;gap:2px;border:1px solid var(--border)}
    .model-btn{padding:4px 10px;border-radius:16px;border:none;font-size:0.7rem;cursor:pointer;font-family:inherit;transition:all 0.2s;color:var(--muted);background:transparent}
    .model-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-light));color:#fff}
    .header-actions{display:flex;gap:6px}
    .icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.07);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .icon-btn:active{transform:scale(0.9)}
    .mode-bar{display:none;gap:6px;padding:8px 16px 4px;flex-shrink:0}
    .mode-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:0.72rem;cursor:pointer;font-family:inherit;background:rgba(255,255,255,0.05);color:var(--muted);display:flex;align-items:center;gap:5px;transition:all 0.2s}
    .mode-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-light));color:#fff;border-color:transparent}
    #scroll-wrap{flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    #messages{padding:16px;display:flex;flex-direction:column;gap:14px;min-height:100%;justify-content:flex-end}
    .msg{display:flex;animation:fadeUp 0.25s ease}
    .msg.user{justify-content:flex-end}
    .msg.bot{justify-content:flex-start;align-items:flex-end;gap:8px}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .bubble{max-width:78%;padding:10px 14px;font-size:0.88rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .bubble.user{background:linear-gradient(135deg,var(--purple),#6d28d9);color:#fff;border-radius:18px 18px 4px 18px}
    .bubble.bot{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:18px 18px 18px 4px}
    .thinking{display:flex;align-items:center;gap:8px;padding:4px 0}
    .thinking-text{font-size:0.8rem;color:var(--muted);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
    .stars-container{display:flex;gap:4px;align-items:center}
    .star{font-size:14px;animation:starSpin 1.5s infinite;display:inline-block}
    .star:nth-child(1){animation-delay:0s}
    .star:nth-child(2){animation-delay:0.3s}
    .star:nth-child(3){animation-delay:0.6s}
    @keyframes starSpin{0%{transform:scale(0.5) rotate(0deg);opacity:0.3}50%{transform:scale(1.2) rotate(180deg);opacity:1}100%{transform:scale(0.5) rotate(360deg);opacity:0.3}}
    .cursor{display:inline-block;width:2px;height:1em;background:var(--purple-light);margin-left:2px;animation:blink 0.7s infinite;vertical-align:text-bottom}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    #input-area{flex-shrink:0;padding:10px 16px 14px;background:rgba(15,12,41,0.95);border-top:1px solid var(--border)}
    .input-row{display:flex;align-items:flex-end;gap:8px}
    textarea{flex:1;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:10px 16px;font-size:0.9rem;font-family:inherit;line-height:1.5;max-height:100px;resize:none;-webkit-appearance:none}
    textarea:focus{outline:none;border-color:rgba(167,139,250,0.6)}
    textarea::placeholder{color:rgba(167,139,250,0.35)}
    .send-btn{width:40px;height:40px;border-radius:50%;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--purple),var(--purple-light));cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .send-btn:disabled{background:rgba(255,255,255,0.1)}
    .send-btn:active{transform:scale(0.92)}
    .attach-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,0.07);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
    #img-preview-wrap{display:none;margin-bottom:8px;position:relative;width:fit-content}
    #img-preview{width:70px;height:70px;object-fit:cover;border-radius:10px}
    #img-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    #sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:rgba(15,12,41,0.98);backdrop-filter:blur(20px);border-right:1px solid var(--border);z-index:100;transition:left 0.3s ease;display:flex;flex-direction:column}
    #sidebar.open{left:0}
    #sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none}
    #sidebar-overlay.open{display:block}
    .sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .sidebar-header h2{font-size:1rem;color:#e9d5ff}
    .sidebar-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
    #history-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .history-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);cursor:pointer;font-size:0.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-item .hist-model{font-size:0.68rem;color:var(--muted);margin-top:2px}
    .history-empty{color:var(--muted);font-size:0.82rem;text-align:center;padding:20px}
    .new-chat-btn{margin:12px;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--purple-light));color:#fff;font-size:0.85rem;font-family:inherit;cursor:pointer}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="brand">
      <span class="brand-icon">✨</span>
      <div class="brand-text">
        <h1 id="model-name">Astro 1.2</h1>
        <small id="model-sub">powered by Ano</small>
      </div>
    </div>
    <div class="model-switch">
      <button class="model-btn active" id="btn-12" onclick="switchModel('12')">1.2</button>
      <button class="model-btn" id="btn-20" onclick="switchModel('20')">2.0</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="newChat()" title="New Chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleSidebar()" title="Riwayat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="mode-bar" id="mode-bar">
    <button class="mode-btn" id="btn-think" onclick="toggleMode('think')">🧠 Berpikir</button>
    <button class="mode-btn" id="btn-research" onclick="toggleMode('research')">🔍 Deep Research</button>
  </div>

  <div id="scroll-wrap">
    <div id="messages"></div>
  </div>

  <div id="input-area">
    <div id="img-preview-wrap">
      <img id="img-preview" src="" alt=""/>
      <button id="img-remove" onclick="removeImage()">✕</button>
    </div>
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(event)"/>
      <textarea id="input" rows="1" placeholder="Ketik pesan..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="sidebar-header">
    <h2>💬 Riwayat Chat</h2>
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  </div>
  <button class="new-chat-btn" onclick="newChat();toggleSidebar()">+ New Chat</button>
  <div id="history-list"></div>
</div>

<script>
var GROQ_KEY = "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";
var GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";

var SYSTEM_12 = "Kamu adalah Ano, asisten AI yang ramah dan helpful. Jawab dalam bahasa yang sama dengan pengguna.";
var SYSTEM_20 = "Kamu adalah Ano 2.0, asisten AI canggih yang thoughtful dan mendalam. Jawab dengan terstruktur, gunakan contoh konkret, berpikir step-by-step untuk masalah rumit. Jawab dalam bahasa yang sama dengan pengguna.";

var currentModel = '12';
var currentMode = 'normal';
var history = [];
var loading = false;
var pendingImage = null;
var allChats = [];
var currentChatId = Date.now();

try { allChats = JSON.parse(localStorage.getItem('astro_chats') || '[]'); } catch(e) { allChats = []; }

var scrollWrap = document.getElementById('scroll-wrap');
var messagesEl = document.getElementById('messages');
var textarea = document.getElementById('input');
var sendBtn = document.getElementById('send-btn');

function scrollBottom() {
  setTimeout(function() { scrollWrap.scrollTop = scrollWrap.scrollHeight; }, 60);
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function switchModel(m) {
  currentModel = m;
  document.getElementById('btn-12').classList.toggle('active', m==='12');
  document.getElementById('btn-20').classList.toggle('active', m==='20');
  document.getElementById('model-name').textContent = m==='12' ? 'Astro 1.2' : 'Astro 2.0';
  document.getElementById('model-sub').textContent = m==='12' ? 'powered by Ano · LLaMA' : 'powered by Ano · LLaMA Pro';
  document.getElementById('mode-bar').style.display = m==='20' ? 'flex' : 'none';
  if (m==='12') {
    currentMode = 'normal';
    document.getElementById('btn-think').classList.remove('active');
    document.getElementById('btn-research').classList.remove('active');
  }
}

function toggleMode(mode) {
  if (currentMode === mode) {
    currentMode = 'normal';
    document.getElementById('btn-think').classList.remove('active');
    document.getElementById('btn-research').classList.remove('active');
  } else {
    currentMode = mode;
    document.getElementById('btn-think').classList.toggle('active', mode==='think');
    document.getElementById('btn-research').classList.toggle('active', mode==='research');
  }
}

function newChat() {
  if (history.length > 0) {
    var firstMsg = null;
    for (var i=0; i<history.length; i++) { if (history[i].role==='user') { firstMsg=history[i]; break; } }
    var title = firstMsg ? firstMsg.content.substring(0,40) : 'Chat baru';
    var existing = -1;
    for (var j=0; j<allChats.length; j++) { if (allChats[j].id===currentChatId) { existing=j; break; } }
    var chatData = {id:currentChatId, title:title, model:currentModel, history:history, time:Date.now()};
    if (existing >= 0) allChats[existing] = chatData;
    else allChats.unshift(chatData);
    try { localStorage.setItem('astro_chats', JSON.stringify(allChats.slice(0,30))); } catch(e) {}
  }
  history = [];
  currentChatId = Date.now();
  messagesEl.innerHTML = '';
  addMsg('bot', 'Halo! Aku Ano 👋 Mau tanya apa?');
  renderHistory();
}

function loadChat(id) {
  var chat = null;
  for (var i=0; i<allChats.length; i++) { if (allChats[i].id===id) { chat=allChats[i]; break; } }
  if (!chat) return;
  history = chat.history;
  currentChatId = chat.id;
  switchModel(chat.model);
  messagesEl.innerHTML = '';
  for (var j=0; j<history.length; j++) {
    var m = history[j];
    if (m.role==='user') addMsg('user', m.content, false, m.image);
    else addMsg('bot', m.content);
  }
  toggleSidebar();
}

function renderHistory() {
  var list = document.getElementById('history-list');
  if (allChats.length === 0) {
    list.innerHTML = '<div class="history-empty">Belum ada riwayat chat</div>';
    return;
  }
  var html = '';
  for (var i=0; i<allChats.length; i++) {
    var c = allChats[i];
    html += '<div class="history-item" onclick="loadChat(' + c.id + ')">' + esc(c.title) + '<div class="hist-model">Astro ' + (c.model==='12'?'1.2':'2.0') + ' · ' + new Date(c.time).toLocaleDateString('id') + '</div></div>';
  }
  list.innerHTML = html;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
  renderHistory();
}

function addMsg(role, content, isThinking, imageBase64) {
  isThinking = isThinking || false;
  var div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'user':'bot');
  if (isThinking) div.id = 'thinking-msg';

  var avatarIcon = currentModel === '20' ? '✦' : '✨';

  if (role === 'bot') {
    var inner = '';
    if (isThinking) {
      inner = '<div class="thinking"><div class="stars-container"><span class="star">✦</span><span class="star">✦</span><span class="star">✦</span></div><span class="thinking-text">sedang berpikir...</span></div>';
    } else {
      inner = esc(content);
    }
    div.innerHTML = '<div class="avatar">' + avatarIcon + '</div><div class="bubble bot">' + inner + '</div>';
  } else {
    var imgHtml = imageBase64 ? '<img src="' + imageBase64 + '" style="max-width:100%;border-radius:10px;margin-bottom:6px;display:block" alt="foto"/>' : '';
    div.innerHTML = '<div class="bubble user">' + imgHtml + esc(content) + '</div>';
  }
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function handleImage(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    pendingImage = {base64: ev.target.result, mimeType: file.type};
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImage() {
  pendingImage = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-preview').src = '';
}

textarea.addEventListener('input', function() {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
});
textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function typeWriter(el, text, speed) {
  speed = speed || 10;
  el.innerHTML = '';
  var cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  for (var i = 0; i < text.length; i++) {
    if (text[i] === '\n') {
      el.insertBefore(document.createElement('br'), cursor);
    } else {
      var span = document.createElement('span');
      span.textContent = text[i];
      el.insertBefore(span, cursor);
    }
    await new Promise(function(r) { setTimeout(r, speed); });
  }
  cursor.remove();
}

async function sendMessage() {
  var text = textarea.value.trim();
  if ((!text && !pendingImage) || loading) return;
  loading = true;
  sendBtn.disabled = true;
  textarea.value = '';
  textarea.style.height = 'auto';

  var imgData = pendingImage;
  removeImage();

  addMsg('user', text || '📷 Foto', false, imgData ? imgData.base64 : null);
  addMsg('bot', '', true);
  history.push({role:'user', content: text || 'Jelaskan gambar ini', image: imgData ? imgData.base64 : null});

  try {
    var reply = '';
    if (currentModel === '12') {
      reply = await callGroq(text || 'Jelaskan gambar ini', SYSTEM_12, 1000);
    } else {
      reply = await callAstro20(text || 'Jelaskan gambar ini');
    }
    history.push({role:'assistant', content: reply});
    var t = document.getElementById('thinking-msg');
    if (t) {
      t.removeAttribute('id');
      var bubble = t.querySelector('.bubble');
      bubble.className = 'bubble bot';
      bubble.innerHTML = '';
      await typeWriter(bubble, reply, 10);
    }
  } catch(err) {
    var t2 = document.getElementById('thinking-msg');
    if (t2) { t2.querySelector('.bubble').innerHTML = '⚠️ ' + esc(err.message); t2.removeAttribute('id'); }
    history.pop();
  } finally {
    loading = false;
    sendBtn.disabled = false;
    scrollBottom();
  }
}

async function callGroq(text, sysPrompt, maxTok) {
  var msgs = [{role:'system', content: sysPrompt}];
  for (var i=0; i<history.length-1; i++) {
    msgs.push({role: history[i].role==='assistant'?'assistant':'user', content: history[i].content || ' '});
  }
  msgs.push({role:'user', content: text});

  var res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':'Bearer ' + GROQ_KEY},
    body: JSON.stringify({model:'llama-3.3-70b-versatile', max_tokens: maxTok || 1000, messages: msgs})
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function callAstro20(text) {
  var sysPrompt = SYSTEM_20;
  var maxTok = 2048;

  if (currentMode === 'think') {
    sysPrompt = SYSTEM_20 + '\n\nSebelum menjawab, tulis proses berpikirmu dengan format:\n💭 Proses berpikir:\n[analisis mendalam]\n\n---\n\n[Jawaban final]';
    maxTok = 4000;
  } else if (currentMode === 'research') {
    sysPrompt = SYSTEM_20 + '\n\nGunakan format Deep Research:\n📋 Ringkasan\n🔍 Analisis Mendalam\n📊 Data & Fakta\n⚖️ Pro & Kontra\n💡 Kesimpulan';
    maxTok = 6000;
    text = 'Riset mendalam: ' + text;
  }

  return await callGroq(text, sysPrompt, maxTok);
}

// Init
addMsg('bot', 'Halo! Aku Ano 👋 Mau tanya apa?\n\nSwitch ke Astro 2.0 untuk jawaban lebih mendalam! ✨');

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
